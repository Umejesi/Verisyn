<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root{
    --canvas:#0B0E13; --surface:#12161D; --surface-2:#181D26; --ink:#EDEFF2;
    --ink-soft:#9BA3AE; --ink-faint:#5E6670; --line:#232933; --blue:#4C7CFF;
    --blue-soft:#182238; --safe:#22C57D; --safe-soft:#10241C;
    --warn:#F0B429; --warn-soft:#2A2213; --danger:#F4555C; --danger-soft:#2B171B;
  }
  *{box-sizing:border-box;}
  body{
    width:340px; margin:0; background:var(--canvas); color:var(--ink);
    font-family:-apple-system,'Segoe UI',Inter,sans-serif; font-size:13px;
  }
  .head{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;border-bottom:1px solid var(--line);}
  .logo{width:20px;height:20px;border-radius:6px;background:var(--blue);position:relative;flex-shrink:0;}
  .logo::after{content:'';position:absolute;left:4px;right:4px;height:2px;background:#fff;top:50%;transform:translateY(-50%);border-radius:2px;}
  .head b{font-size:14.5px;}
  .body{padding:14px 16px 16px;}
  .row{display:flex;gap:6px;}
  select, input{
    background:var(--surface-2); border:1px solid var(--line); color:var(--ink);
    border-radius:7px; padding:9px 10px; font-size:12.5px; font-family:'SF Mono',monospace;
  }
  select{flex:0 0 66px;}
  input{flex:1;min-width:0;}
  select:focus, input:focus{outline:none;border-color:var(--blue);}
  button{
    width:100%; margin-top:8px; background:var(--blue); color:#fff; border:none;
    border-radius:7px; padding:10px; font-weight:600; font-size:13px; cursor:pointer;
  }
  button:hover{filter:brightness(1.08);}
  button:disabled{background:var(--ink-faint);cursor:not-allowed;}
  .loading{display:none;align-items:center;gap:7px;color:var(--ink-soft);font-size:12px;margin-top:10px;}
  .loading.show{display:flex;}
  .spin{width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error{display:none;background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);
    border-radius:8px;padding:9px 11px;font-size:12px;margin-top:10px;}
  .error.show{display:block;}
  #results{display:none;margin-top:12px;}
  #results.show{display:block;}
  .verdict{border-radius:10px;padding:12px 13px;border:1.5px solid;margin-bottom:10px;}
  .verdict.safe{background:var(--safe-soft);border-color:var(--safe);}
  .verdict.warn{background:var(--warn-soft);border-color:var(--warn);}
  .verdict.bad{background:var(--danger-soft);border-color:var(--danger);}
  .verdict-title{font-weight:700;font-size:14px;margin-bottom:4px;}
  .verdict-text{font-size:12px;color:var(--ink);line-height:1.4;}
  .flags{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .flag{display:flex;gap:8px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
    border-left:3px solid;border-radius:7px;padding:8px 10px;font-size:11.5px;}
  .flag.ok{border-left-color:var(--safe);} .flag.warn{border-left-color:var(--warn);} .flag.bad{border-left-color:var(--danger);}
  .flag b{display:block;font-size:12px;margin-bottom:1px;}
  .flag span{color:var(--ink-soft);}
  .fullreport{display:block;text-align:center;font-size:12px;color:var(--blue);text-decoration:none;padding:8px;
    border:1px solid var(--line);border-radius:7px;margin-top:2px;}
  .foot{text-align:center;color:var(--ink-faint);font-size:10.5px;padding:8px 16px 14px;}
  .account-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;
    border-bottom:1px solid var(--line);font-size:11.5px;color:var(--ink-soft);}
  .account-row a{color:var(--blue);text-decoration:none;font-weight:600;}
  .quota-line{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:8px;}
  .why-toggle{display:inline-block;font-size:10.5px;color:var(--blue);cursor:pointer;margin-top:3px;font-weight:600;}
  .why-text{font-size:11px;color:var(--ink-soft);line-height:1.4;margin-top:4px;padding-top:4px;border-top:1px dashed var(--line);}
  .share-btn{width:100%;margin-top:6px;background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line);
    border-radius:7px;padding:9px;font-weight:600;font-size:12.5px;cursor:pointer;}  .community-row{display:flex;gap:6px;margin-top:8px;}
  .community-row button{flex:1;font-size:10.5px;padding:6px;border-radius:6px;border:1px solid var(--line);
    background:var(--surface-2);color:var(--ink-soft);cursor:pointer;font-weight:600;}
  .community-row button:hover{border-color:var(--blue);color:var(--blue);}
</style>
</head>
<body>
  <div class="head"><div class="logo"></div><b>Verisyn</b></div>
  <div class="account-row" id="accountRow"></div>
  <div class="body">
    <div class="row">
      <select id="chain">
        <option value="1">ETH</option>
        <option value="56">BSC</option>
        <option value="8453">BASE</option>
        <option value="42161">ARB</option>
      </select>
      <input type="text" id="address" placeholder="0x... contract address">
    </div>
    <button id="scanBtn">Scan</button>
    <div class="loading" id="loading"><div class="spin"></div><span>checking...</span></div>
    <div class="error" id="error"></div>

    <div id="results">
      <div class="verdict" id="verdict">
        <div class="verdict-title" id="verdictTitle">—</div>
        <div class="verdict-text" id="verdictText">—</div>
      </div>
      <div class="flags" id="flags"></div>
      <div class="community-row" id="communityRow"></div>
      <a class="fullreport" id="fullReport" href="#" target="_blank">View full report on Verisyn →</a>
      <button class="share-btn" id="watchBtn">⭐ Save to watchlist</button>
      <button class="share-btn" id="shareBtn">📤 Share this scan</button>
      <div class="quota-line" id="quotaLine"></div>
    </div>
  </div>
  <div class="foot">Data: GoPlus Security. Not financial advice.</div>
  <script src="popup.js"></script>
</body>
</html>
